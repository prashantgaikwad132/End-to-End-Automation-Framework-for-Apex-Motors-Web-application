[pytest]
testpaths = tests
markers =
    smoke: Core smoke tests
    regression: Full regression suite
    inventory: Inventory page tests
    contact: Contact form tests
    navigation: Navigation tests
    responsive: Responsive / cross-device tests
    negative: Negative / boundary tests
    api: API integration tests
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=reports/allure-results
